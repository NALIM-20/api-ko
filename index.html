<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Student Dashboard</title>
    <style>
        /* CELKOVÝ ŠTÝL A ANIMOVANÉ POZADIE */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #00f2ff;
            background: linear-gradient(-45deg, #050505, #0a0a20, #150015, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
            font-size: clamp(24px, 5vw, 42px);
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #0066ff;
            margin-bottom: 30px;
        }

        /* KONTAJNER PRE KARTY */
        #students-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        /* ŠTÝL KARTY */
        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00f2ff;
            border-radius: 15px;
            width: 220px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px #00f2ff;
            border-color: #ff00ff;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .nickname {
            color: #ff00ff;
            font-style: italic;
            text-shadow: 0 0 5px #ff00ff;
            margin: 5px 0;
        }

        /* ŠTÝL PRE VYSKAKOVACIE OKNO (MODAL) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            padding: 20px 0;
        }

        .modal-content {
            background: #0a0a0a;
            margin: 40px auto;
            padding: 25px;
            border: 3px solid #ff00ff;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
            position: relative;
        }

        .close-btn {
            color: #fff;
            position: sticky;
            top: 0;
            right: 0;
            float: right;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        .close-btn:hover { color: #ff00ff; }

        .modal-content img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid #00f2ff;
            margin-bottom: 15px;
        }

        #modal-desc {
            color: #eee;
            line-height: 1.6;
            margin-top: 15px;
            font-size: 16px;
        }

        .loading { text-align: center; font-size: 20px; }
    </style>
</head>
<body>

    <h1>👨‍💻 Neon Student API</h1>

    <div id="students-container">
        <p class="loading">Sťahujem dáta z neónovej siete...</p>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modal-img" src="" alt="foto">
            <h2 id="modal-name" style="margin: 10px 0;"></h2>
            <p class="nickname" id="modal-nick"></p>
            <div id="modal-desc"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById("students-container");
        const modal = document.getElementById("myModal");
        const closeBtn = document.querySelector(".close-btn");

        async function loadStudents() {
            try {
                let response;
                // Pokus o načítanie z lokálneho Flasku, inak zo súboru api.json
                try {
                    response = await fetch("http://127.0.0.1:5000/api");
                } catch (e) {
                    console.log("Flask nebeží, prepínam na api.json");
                    response = await fetch("api.json");
                }

                if (!response.ok) throw new Error("Chyba načítania.");

                const data = await response.json();
                container.innerHTML = "";

                // Ošetrenie formátu (či je to pole alebo objekt s kľúčom 'students')
                const studentsArray = data.students ? data.students : data;

                studentsArray.forEach(student => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${student.image}" alt="foto">
                        <h3>${student.name} ${student.surname}</h3>
                        <p class="nickname">"${student.nickname}"</p>
                    `;
                    
                    // Funkcia po kliknutí na kartu
                    card.onclick = () => {
                        document.getElementById("modal-img").src = student.image;
                        document.getElementById("modal-name").innerText = `${student.name} ${student.surname}`;
                        document.getElementById("modal-nick").innerText = `"${student.nickname}"`;
                        
                        // Zobrazenie bio z JSONu, alebo predvolený text
                        document.getElementById("modal-desc").innerText = student.bio || "Tento študent je súčasťou neónovej elity. Viac informácií už čoskoro!";
                        
                        modal.style.display = "block";
                        document.body.style.overflow = "hidden"; // Zákaz scrollovania pozadia
                    };
                    
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `<p style="color:red">Chyba: ${error.message}</p>`;
            }
        }

        // Zatváranie modalu
        closeBtn.onclick = () => {
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        };

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = "none";
                document.body.style.overflow = "auto";
            }
        };

        loadStudents();
    </script>
</body>
</html>

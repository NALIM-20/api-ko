<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Neon Student Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #00f2ff;
            background: linear-gradient(-45deg, #050505, #0a0a20, #150015, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
            font-size: 40px;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #0066ff;
        }

        #students-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00f2ff;
            border-radius: 15px;
            width: 220px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px #00f2ff;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .nickname {
            color: #ff00ff;
            font-style: italic;
            text-shadow: 0 0 5px #ff00ff;
        }
    </style>
</head>
<body>

    <h1>👨‍💻 Neon Student API</h1>

    <div id="students-container">
        <p>Načítavam študentov...</p>
    </div>

    <script>
        const container = document.getElementById("students-container");

        async function loadStudents() {
            try {
                // Skúsime najprv lokálny backend, ak zlyhá, skúsime api.json
                let response;
                try {
                    response = await fetch("http://127.0.0.1:5000/api");
                } catch (e) {
                    console.log("Flask nebeží, skúšam api.json");
                    response = await fetch("api.json");
                }

                if (!response.ok) throw new Error("Dáta sa nepodarilo načítať.");

                const data = await response.json();
                container.innerHTML = "";

                // OŠETRENIE FORMÁTU DÁT:
                // Ak je to objekt {"students": [...]}, vezmeme to pole, inak berieme priamo data
                const studentsArray = data.students ? data.students : data;

                if (!Array.isArray(studentsArray)) {
                    throw new Error("Dáta nie sú vo formáte poľa!");
                }

                studentsArray.forEach(student => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${student.image}" alt="foto">
                        <h3>${student.name} ${student.surname}</h3>
                        <p class="nickname">"${student.nickname}"</p>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `<p style="color:red">Chyba: ${error.message}</p>`;
            }
        }

        loadStudents();
    </script>
</body>
</html>

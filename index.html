<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Neon Student Dashboard</title>
    <style>
        /* Tvoje pôvodné štýly zostávajú... */
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif;
            color: #00f2ff; background: linear-gradient(-45deg, #050505, #0a0a20, #150015, #050505);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        h1 { text-align: center; font-size: 40px; text-shadow: 0 0 10px #00f2ff, 0 0 20px #0066ff; }
        #students-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 30px; }

        .card {
            background: rgba(0, 0, 0, 0.8); border: 2px solid #00f2ff; border-radius: 15px;
            width: 220px; padding: 15px; text-align: center; transition: 0.3s;
            backdrop-filter: blur(5px); cursor: pointer; /* Pridaná ruka pri prejdení */
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 0 30px #00f2ff; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; border: 1px solid #333; }
        .nickname { color: #ff00ff; font-style: italic; text-shadow: 0 0 5px #ff00ff; }

        /* --- NOVÉ ŠTÝLY PRE MODAL OKNO --- */
        .modal {
            display: none; /* Skryté na začiatku */
            position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0a0a0a; margin: 10% auto; padding: 30px;
            border: 3px solid #ff00ff; border-radius: 20px; width: 350px;
            text-align: center; box-shadow: 0 0 50px #ff00ff;
            animation: modalPop 0.3s ease-out;
        }

        @keyframes modalPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-content img { width: 100%; border-radius: 15px; border: 2px solid #00f2ff; margin-bottom: 20px; }
        .close-btn { color: #fff; float: right; font-size: 30px; cursor: pointer; margin-top: -20px; }
        .close-btn:hover { color: #ff00ff; }
        #modal-desc { color: #fff; line-height: 1.6; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>👨‍💻 Neon Student API</h1>

    <div id="students-container">
        <p>Načítavam študentov...</p>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modal-img" src="" alt="foto">
            <h2 id="modal-name"></h2>
            <p class="nickname" id="modal-nick"></p>
            <div id="modal-desc">Sem napíš niečo o spolužiakovi...</div>
        </div>
    </div>

    <script>
        const container = document.getElementById("students-container");
        const modal = document.getElementById("myModal");
        const closeBtn = document.querySelector(".close-btn");

        async function loadStudents() {
            try {
                let response;
                try {
                    response = await fetch("http://127.0.0.1:5000/api");
                } catch (e) {
                    response = await fetch("api.json");
                }
                const data = await response.json();
                container.innerHTML = "";
                const studentsArray = data.students ? data.students : data;

                studentsArray.forEach(student => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${student.image}" alt="foto">
                        <h3>${student.name} ${student.surname}</h3>
                        <p class="nickname">"${student.nickname}"</p>
                    `;
                    
                    // --- NOVÁ ČASŤ: KLIKNUTIE NA KARTU ---
                    card.onclick = () => {
                        document.getElementById("modal-img").src = student.image;
                        document.getElementById("modal-name").innerText = `${student.name} ${student.surname}`;
                        document.getElementById("modal-nick").innerText = `"${student.nickname}"`;
                        
                        // Tu si môžeš pridať do JSONu nový kľúč "bio" a vypisovať ho:
                        document.getElementById("modal-desc").innerText = student.bio || "Tento študent je neónový expert na Python a miluje kódovanie!";
                        
                        modal.style.display = "block";
                    };
                    
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `<p style="color:red">Chyba: ${error.message}</p>`;
            }
        }

        // Zavretie okna
        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }

        loadStudents();
    </script>
</body>
</html>
